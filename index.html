<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RE Requiem CheatSheet - OBS Clean</title>
    <style>
        :root {
            --neon-green: #2ecc71;    
            --insanity-blue: #3498db;
        }

        body {
            background: rgba(10, 10, 10, 0.95); /* Dunkler Grund für gute Lesbarkeit */
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 10px;
            overflow: hidden; /* Verhindert Scrollbalken in OBS */
        }

        .container {
            width: 100%;
            border-top: 4px solid var(--neon-green);
            transition: border-color 0.4s;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 5px 0;
            border-bottom: 1px solid #333;
        }

        .header h1 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0;
            color: #888;
        }

        /* Schlichter Toggle für den Spieler */
        .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #333; border-radius: 20px; transition: .3s; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: .3s; }
        input:checked + .slider { background: var(--insanity-blue); }
        input:checked + .slider:before { transform: translateX(16px); }

        .safe-item {
            background: rgba(255, 255, 255, 0.05);
            margin-bottom: 5px;
            padding: 8px 12px;
            border-radius: 3px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .safe-info h3 { margin: 0; font-size: 14px; color: #fff; }
        .safe-info p { margin: 1px 0 0; font-size: 10px; color: #00ff88; font-weight: bold; text-transform: uppercase; }

        .code-display { 
            font-family: 'Consolas', monospace; 
            font-size: 16px; 
            font-weight: bold; 
            color: var(--neon-green); 
        }

        .footer-box { 
            margin-top: 10px; 
            padding: 8px; 
            background: rgba(0,0,0,0.3); 
            font-size: 11px; 
            color: #aaa; 
            line-height: 1.4;
        }

        .insanity-border { border-top-color: var(--insanity-blue) !important; }
        .insanity-text { color: var(--insanity-blue) !important; }
        .insanity-reward { color: #3498db !important; }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <div class="header">
        <h1>RE Requiem</h1>
        <div style="display: flex; align-items: center; gap: 8px;">
            <span id="label" style="font-size: 10px; font-weight: bold; color: var(--neon-green);">NORMAL</span>
            <label class="switch">
                <input type="checkbox" id="diffToggle">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div id="safeList"></div>

    <div class="footer-box">
        OFFICE: MOON-SUN-STAR-MOON | RESEARCH: STAR-SUN-MOON-SUN
    </div>
</div>

<script>
    const safes = [
        { name: "Untersuchung", normal: "30R-10L-50R", insanity: "50L-30R-90L", reward: "Spray" },
        { name: "Bar & Lounge", normal: "10L-80R-30L", insanity: "20R-50L-30R", reward: "W-Mod" },
        { name: "Kellergang", normal: "60R-40L-80R", insanity: "70L-50R-20L", reward: "Tasche" },
        { name: "Sterilisation", normal: "10R-90L-20R", insanity: "80L-50R-0L", reward: "Upgrade" },
        { name: "Kontrollraum", normal: "50L-60R-80L", insanity: "20R-0L-70R", reward: "Ammo" }
    ];

    const toggle = document.getElementById('diffToggle');
    const label = document.getElementById('label');
    const safeListDiv = document.getElementById('safeList');
    const container = document.getElementById('mainContainer');

    function render() {
        const isInsanity = toggle.checked;
        label.innerText = isInsanity ? 'INSANITY' : 'NORMAL';
        label.style.color = isInsanity ? 'var(--insanity-blue)' : 'var(--neon-green)';
        container.className = isInsanity ? 'container insanity-border' : 'container';

        safeListDiv.innerHTML = '';
        safes.forEach(safe => {
            const code = isInsanity ? safe.insanity : safe.normal;
            const item = document.createElement('div');
            item.className = 'safe-item';
            item.innerHTML = `
                <div class="safe-info">
                    <h3>${safe.name}</h3>
                    <p class="${isInsanity ? 'insanity-reward' : ''}">${safe.reward}</p>
                </div>
                <div class="code-display ${isInsanity ? 'insanity-text' : ''}">${code}</div>
            `;
            safeListDiv.appendChild(item);
        });
    }

    toggle.addEventListener('change', render);
    render();
</script>

</body>
</html>
