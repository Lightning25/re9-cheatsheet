<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RE Requiem CheatSheet</title>
    <style>
        :root {
            --neon-green: #2ecc71;    
            --insanity-blue: #3498db; /* Angenehmes Blau statt stechendem Rot/Lila */
            --text-header: #ffffff;
            --text-reward: #bdc3c7;   /* Deutlich helleres Silber für Belohnungen */
            --dark-bg: #050505;
            --panel-bg: #121212;
        }

        body {
            background: var(--dark-bg);
            color: #eee;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            width: 95%;
            max-width: 460px;
            background: var(--panel-bg);
            border: 1px solid #222;
            border-top: 4px solid var(--neon-green);
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            transition: border-color 0.4s;
        }

        .header h1 {
            color: #888;
            font-size: 14px;
            text-align: center;
            text-transform: uppercase;
            margin: 0 0 25px 0;
            letter-spacing: 3px;
        }

        .toggle-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            background: #0a0a0a;
            padding: 12px;
            border-radius: 6px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 20px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #222;
            transition: .3s;
            border-radius: 20px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 14px; width: 14px;
            left: 3px; bottom: 3px;
            background-color: #555;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: #1a2a3a; }
        input:checked + .slider:before { transform: translateX(24px); background-color: var(--insanity-blue); }

        .difficulty-label { font-weight: bold; font-size: 11px; letter-spacing: 1px; color: #333; }
        .active-normal { color: var(--neon-green); text-shadow: 0 0 5px rgba(46, 204, 113, 0.3); }
        .active-insanity { color: var(--insanity-blue); text-shadow: 0 0 5px rgba(52, 152, 219, 0.3); }

        .safe-item {
            background: #181818;
            margin-bottom: 12px; /* Mehr Abstand zwischen den Items */
            padding: 15px 18px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 3px solid #222;
        }

        .safe-info h3 { margin: 0; font-size: 15px; color: #fff; font-weight: 500; }
        
        .safe-info p { 
            margin: 4px 0 0; 
            font-size: 10px; 
            color: var(--text-reward); /* Helleres Silber */
            text-transform: uppercase; 
            letter-spacing: 0.8px;
            font-weight: 600;
        }

        .code-display {
            font-family: 'Consolas', monospace;
            font-size: 16px;
            font-weight: bold;
            color: var(--neon-green);
        }

        .footer-box {
            margin-top: 25px;
            padding: 15px;
            background: #0a0a0a;
            font-size: 11px;
            color: #666;
            border-radius: 5px;
            line-height: 1.8;
        }

        .footer-box strong { color: #444; display: block; margin-bottom: 6px; font-size: 10px; letter-spacing: 1px; }

        .insanity-border { border-top-color: var(--insanity-blue) !important; }
        .insanity-text { color: var(--insanity-blue) !important; }
        .insanity-item { border-left-color: var(--insanity-blue) !important; }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <div class="header">
        <h1>RE Requiem CheatSheet</h1>
    </div>

    <div class="toggle-container">
        <span id="labelNormal" class="difficulty-label active-normal">NORMAL</span>
        <label class="switch">
            <input type="checkbox" id="diffToggle">
            <span class="slider"></span>
        </label>
        <span id="labelInsanity" class="difficulty-label">INSANITY</span>
    </div>

    <div id="safeList"></div>

    <div class="footer-box">
        <strong>TERMINAL SOLUTIONS:</strong>
        Office: MOON - SUN - STAR - MOON<br>
        Research: STAR - SUN - MOON - SUN<br>
        Security: STAR - STAR - MOON - SUN
    </div>
</div>

<script>
    const safes = [
        { name: "Untersuchungsraum", normal: "30R-10L-50R", insanity: "50L-30R-90L", reward: "Erste-Hilfe-Spray" },
        { name: "Bar & Lounge", normal: "10L-80R-30L", insanity: "20R-50L-30R", reward: "Waffen-Mod" },
        { name: "Kellergang", normal: "60R-40L-80R", insanity: "70L-50R-20L", reward: "Gürteltasche (+2)" },
        { name: "Sterilisationsraum", normal: "10R-90L-20R", insanity: "80L-50R-0L", reward: "Waffen-Upgrade" },
        { name: "Kontrollraum", normal: "50L-60R-80L", insanity: "20R-0L-70R", reward: "Schwere Munition" }
    ];

    const toggle = document.getElementById('diffToggle');
    const safeListDiv = document.getElementById('safeList');
    const container = document.getElementById('mainContainer');

    function render() {
        const isInsanity = toggle.checked;
        
        document.getElementById('labelNormal').className = isInsanity ? 'difficulty-label' : 'difficulty-label active-normal';
        document.getElementById('labelInsanity').className = isInsanity ? 'difficulty-label active-insanity' : 'difficulty-label';
        container.className = isInsanity ? 'container insanity-border' : 'container';

        safeListDiv.innerHTML = '';
        safes.forEach(safe => {
            const code = isInsanity ? safe.insanity : safe.normal;
            const item = document.createElement('div');
            item.className = 'safe-item' + (isInsanity ? ' insanity-item' : '');
            
            item.innerHTML = `
                <div class="safe-info">
                    <h3>${safe.name}</h3>
                    <p>${safe.reward}</p>
                </div>
                <div class="code-display ${isInsanity ? 'insanity-text' : ''}">${code}</div>
            `;
            safeListDiv.appendChild(item);
        });
    }

    toggle.addEventListener('change', render);
    render();
</script>

</body>
</html>
