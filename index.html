<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RE Requiem CheatSheet</title>
    <style>
        :root {
            --neon-green: #00FF7F;
            --insanity-red: #FF4500;
            --dark-bg: #0a0a0a;
            --panel-bg: rgba(15, 15, 15, 0.95);
        }

        body {
            background: var(--dark-bg);
            background-image: radial-gradient(circle at center, #1a2a1a 0%, #050505 100%);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            width: 95%;
            max-width: 480px;
            background: var(--panel-bg);
            border: 2px solid var(--neon-green);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 0 25px rgba(0, 255, 127, 0.15);
            backdrop-filter: blur(8px);
            transition: all 0.4s ease-in-out;
        }

        .header {
            text-align: center;
            margin-bottom: 15px;
        }

        .header h1 {
            color: var(--neon-green);
            font-size: 20px;
            letter-spacing: 1.5px;
            margin: 8px 0;
            text-transform: uppercase;
        }

        .logo {
            width: 50px;
            height: 50px;
            margin: 0 auto;
            border: 2px solid var(--neon-green);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            color: var(--neon-green);
        }

        .toggle-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.03);
            padding: 8px;
            border-radius: 40px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 54px;
            height: 26px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #222;
            transition: .3s;
            border-radius: 30px;
            border: 1px solid #444;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 4px; bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: #400; border-color: var(--insanity-red); }
        input:checked + .slider:before { transform: translateX(26px); }

        .difficulty-label {
            font-weight: bold;
            font-size: 13px;
            letter-spacing: 1px;
            opacity: 0.5;
        }

        .active-normal { color: var(--neon-green); opacity: 1; text-shadow: 0 0 8px var(--neon-green); }
        .active-insanity { color: var(--insanity-red); opacity: 1; text-shadow: 0 0 8px var(--insanity-red); }

        .safe-item {
            background: rgba(255, 255, 255, 0.02);
            border-left: 3px solid var(--neon-green);
            margin-bottom: 10px;
            padding: 10px 15px;
            border-radius: 0 5px 5px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .safe-info h3 { margin: 0; font-size: 14px; color: #ddd; }
        .safe-info p { margin: 2px 0 0; font-size: 10px; color: #777; text-transform: uppercase; }

        .code-display {
            font-family: 'Consolas', monospace;
            font-size: 16px;
            font-weight: bold;
            color: var(--neon-green);
        }

        .footer-box {
            margin-top: 15px;
            padding: 12px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 8px;
            border: 1px solid #222;
            font-size: 12px;
            line-height: 1.5;
        }

        .footer-box strong { color: var(--neon-green); display: block; margin-bottom: 4px; }

        .insanity-border { border-color: var(--insanity-red) !important; box-shadow: 0 0 25px rgba(255, 69, 0, 0.2) !important; }
        .insanity-text { color: var(--insanity-red) !important; text-shadow: 0 0 8px rgba(255, 69, 0, 0.4) !important; }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <div class="header">
        <div class="logo" id="logoIcon">☢</div>
        <h1 id="mainTitle">RE Requiem CheatSheet</h1>
    </div>

    <div class="toggle-container">
        <span id="labelNormal" class="difficulty-label active-normal">NORMAL</span>
        <label class="switch">
            <input type="checkbox" id="diffToggle">
            <span class="slider"></span>
        </label>
        <span id="labelInsanity" class="difficulty-label">INSANITY</span>
    </div>

    <div id="safeList"></div>

    <div class="footer-box">
        <strong id="footerTitle">⚡ TERMINAL SOLUTIONS:</strong>
        • Office: MOON - SUN - STAR - MOON<br>
        • Research: STAR - SUN - MOON - SUN<br>
        • Security: STAR - STAR - MOON - SUN
    </div>
</div>

<script>
    const safes = [
        { name: "Examination Room", normal: "30R-10L-50R", insanity: "50L-30R-90L", reward: "First Aid Spray" },
        { name: "Bar & Lounge", normal: "10L-80R-30L", insanity: "20R-50L-30R", reward: "Weapon Mod" },
        { name: "Basement Passage", normal: "60R-40L-80R", insanity: "70L-50R-20L", reward: "Hip Pouch (+2)" },
        { name: "Sterilization Room", normal: "10R-90L-20R", insanity: "80L-50R-0L", reward: "Weapon Upgrade" },
        { name: "Control Room", normal: "50L-60R-80L", insanity: "20R-0L-70R", reward: "Heavy Ammo" }
    ];

    const toggle = document.getElementById('diffToggle');
    const safeListDiv = document.getElementById('safeList');
    const container = document.getElementById('mainContainer');
    const logoIcon = document.getElementById('logoIcon');
    const mainTitle = document.getElementById('mainTitle');
    const footerTitle = document.getElementById('footerTitle');

    function render() {
        const isInsanity = toggle.checked;
        
        document.getElementById('labelNormal').className = isInsanity ? 'difficulty-label' : 'difficulty-label active-normal';
        document.getElementById('labelInsanity').className = isInsanity ? 'difficulty-label active-insanity' : 'difficulty-label';
        
        container.className = isInsanity ? 'container insanity-border' : 'container';
        logoIcon.style.color = isInsanity ? 'var(--insanity-red)' : 'var(--neon-green)';
        logoIcon.style.borderColor = isInsanity ? 'var(--insanity-red)' : 'var(--neon-green)';
        mainTitle.style.color = isInsanity ? 'var(--insanity-red)' : 'var(--neon-green)';
        footerTitle.style.color = isInsanity ? 'var(--insanity-red)' : 'var(--neon-green)';

        safeListDiv.innerHTML = '';
        safes.forEach(safe => {
            const code = isInsanity ? safe.insanity : safe.normal;
            const item = document.createElement('div');
            item.className = 'safe-item';
            item.style.borderLeftColor = isInsanity ? 'var(--insanity-red)' : 'var(--neon-green)';
            
            item.innerHTML = `
                <div class="safe-info">
                    <h3>${safe.name}</h3>
                    <p>${safe.reward}</p>
                </div>
                <div class="code-display ${isInsanity ? 'insanity-text' : ''}">${code}</div>
            `;
            safeListDiv.appendChild(item);
        });
    }

    toggle.addEventListener('change', render);
    render();
</script>

</body>
</html>
