<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RE Requiem CheatSheet</title>
    <style>
        :root {
            --neon-green: #00cc66; /* Etwas dunkleres Grün */
            --insanity-red: #cc3300; /* Etwas matteres Rot */
            --dark-bg: #0a0a0a;
            --panel-bg: rgba(20, 20, 20, 0.98);
        }

        body {
            background: var(--dark-bg);
            background-image: radial-gradient(circle at center, #121a12 0%, #050505 100%);
            color: #ccc; /* Sanfteres Weiß/Grau */
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            width: 95%;
            max-width: 450px;
            background: var(--panel-bg);
            border: 1px solid #333; /* Dezenterer Rahmen statt Leuchten */
            border-top: 3px solid var(--neon-green); /* Nur oben ein Akzent */
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: border-color 0.4s;
        }

        .header h1 {
            color: #eee;
            font-size: 18px;
            letter-spacing: 1px;
            text-align: center;
            text-transform: uppercase;
            margin: 10px 0 20px 0;
        }

        .toggle-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            background: #1a1a1a;
            padding: 8px;
            border-radius: 6px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333;
            transition: .3s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 3px; bottom: 3px;
            background-color: #aaa;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: #400; }
        input:checked + .slider:before { transform: translateX(26px); background-color: var(--insanity-red); }

        .difficulty-label { font-weight: bold; font-size: 12px; color: #555; }
        .active-normal { color: var(--neon-green); }
        .active-insanity { color: var(--insanity-red); }

        .safe-item {
            background: #151515;
            margin-bottom: 8px;
            padding: 10px 15px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 2px solid #333;
        }

        .safe-info h3 { margin: 0; font-size: 14px; color: #bbb; font-weight: 500; }
        .safe-info p { margin: 2px 0 0; font-size: 10px; color: #555; text-transform: uppercase; }

        .code-display {
            font-family: 'Consolas', monospace;
            font-size: 15px;
            font-weight: bold;
            color: var(--neon-green); /* Kein Text-Shadow mehr */
        }

        .footer-box {
            margin-top: 15px;
            padding: 12px;
            background: #111;
            border-radius: 4px;
            font-size: 12px;
            border-top: 1px solid #222;
        }

        .footer-box strong { color: #888; display: block; margin-bottom: 5px; font-size: 11px; }

        /* Insanity State Updates */
        .insanity-border { border-top-color: var(--insanity-red) !important; }
        .insanity-text { color: var(--insanity-red) !important; }
        .insanity-item { border-left-color: var(--insanity-red) !important; }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <div class="header">
        <h1 id="mainTitle">RE Requiem CheatSheet</h1>
    </div>

    <div class="toggle-container">
        <span id="labelNormal" class="difficulty-label active-normal">NORMAL</span>
        <label class="switch">
            <input type="checkbox" id="diffToggle">
            <span class="slider"></span>
        </label>
        <span id="labelInsanity" class="difficulty-label">INSANITY</span>
    </div>

    <div id="safeList"></div>

    <div class="footer-box">
        <strong id="footerTitle">TERMINAL SOLUTIONS:</strong>
        Office: MOON - SUN - STAR - MOON<br>
        Research: STAR - SUN - MOON - SUN<br>
        Security: STAR - STAR - MOON - SUN
    </div>
</div>

<script>
    const safes = [
        { name: "Examination Room", normal: "30R-10L-50R", insanity: "50L-30R-90L", reward: "First Aid Spray" },
        { name: "Bar & Lounge", normal: "10L-80R-30L", insanity: "20R-50L-30R", reward: "Weapon Mod" },
        { name: "Basement Passage", normal: "60R-40L-80R", insanity: "70L-50R-20L", reward: "Hip Pouch (+2)" },
        { name: "Sterilization Room", normal: "10R-90L-20R", insanity: "80L-50R-0L", reward: "Weapon Upgrade" },
        { name: "Control Room", normal: "50L-60R-80L", insanity: "20R-0L-70R", reward: "Heavy Ammo" }
    ];

    const toggle = document.getElementById('diffToggle');
    const safeListDiv = document.getElementById('safeList');
    const container = document.getElementById('mainContainer');

    function render() {
        const isInsanity = toggle.checked;
        
        document.getElementById('labelNormal').className = isInsanity ? 'difficulty-label' : 'difficulty-label active-normal';
        document.getElementById('labelInsanity').className = isInsanity ? 'difficulty-label active-insanity' : 'difficulty-label';
        container.className = isInsanity ? 'container insanity-border' : 'container';

        safeListDiv.innerHTML = '';
        safes.forEach(safe => {
            const code = isInsanity ? safe.insanity : safe.normal;
            const item = document.createElement('div');
            item.className = 'safe-item' + (isInsanity ? ' insanity-item' : '');
            
            item.innerHTML = `
                <div class="safe-info">
                    <h3>${safe.name}</h3>
                    <p>${safe.reward}</p>
                </div>
                <div class="code-display ${isInsanity ? 'insanity-text' : ''}">${code}</div>
            `;
            safeListDiv.appendChild(item);
        });
    }

    toggle.addEventListener('change', render);
    render();
</script>

</body>
</html>
