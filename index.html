<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RE Requiem CheatSheet</title>
    <style>
        :root {
            --neon-green: #00FF7F;
            --insanity-red: #FF4500;
            --dark-bg: #0a0a0a;
            --panel-bg: rgba(20, 20, 20, 0.9);
        }

        body {
            background: var(--dark-bg);
            background-image: radial-gradient(circle at center, #1a2a1a 0%, #050505 100%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            width: 90%;
            max-width: 500px;
            background: var(--panel-bg);
            border: 2px solid var(--neon-green);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 0 20px rgba(0, 255, 127, 0.2);
            backdrop-filter: blur(10px);
            transition: all 0.5s ease;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            color: var(--neon-green);
            font-size: 22px;
            letter-spacing: 2px;
            margin: 10px 0;
            text-transform: uppercase;
            transition: color 0.5s;
        }

        .logo {
            width: 60px;
            height: 60px;
            margin: 0 auto;
            border: 2px solid var(--neon-green);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: var(--neon-green);
            transition: all 0.5s;
        }

        .toggle-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 50px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 30px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333;
            transition: .4s;
            border-radius: 34px;
            border: 1px solid #555;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 22px; width: 22px;
            left: 4px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: #600; border-color: var(--insanity-red); }
        input:checked + .slider:before { transform: translateX(30px); }

        .difficulty-label {
            font-weight: bold;
            font-size: 14px;
            transition: 0.3s;
            letter-spacing: 1px;
        }

        .active-normal { color: var(--neon-green); text-shadow: 0 0 10px var(--neon-green); }
        .active-insanity { color: var(--insanity-red); text-shadow: 0 0 10px var(--insanity-red); }

        .safe-item {
            background: rgba(255, 255, 255, 0.03);
            border-left: 3px solid var(--neon-green);
            margin-bottom: 12px;
            padding: 12px;
            border-radius: 0 8px 8px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: border-color 0.5s;
        }

        .safe-info h3 { margin: 0; font-size: 15px; color: #eee; }
        .safe-info p { margin: 3px 0 0; font-size: 11px; color: #888; }

        .code-display {
            font-family: 'Consolas', monospace;
            font-size: 17px;
            font-weight: bold;
            color: var(--neon-green);
            text-shadow: 0 0 8px rgba(0, 255, 127, 0.5);
            transition: color 0.5s;
        }

        .footer-box {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            border: 1px solid #333;
            font-size: 13px;
            line-height: 1.6;
        }

        .footer-box strong { color: var(--neon-green); display: block; margin-bottom: 5px; transition: color 0.5s; }

        /* Insanity Styles */
        .insanity-border { border-color: var(--insanity-red) !important; box-shadow: 0 0 20px rgba(255, 69, 0, 0.3) !important; }
        .insanity-text { color: var(--insanity-red) !important; text-shadow: 0 0 8px rgba(255, 69, 0, 0.6) !important; }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <div class="header">
        <div class="logo" id="logoIcon">☢</div>
        <h1 id="mainTitle">RE Requiem CheatSheet</h1>
    </div>

    <div class="toggle-container">
        <span id="labelNormal" class="difficulty-label active-normal">NORMAL</span>
        <label class="switch">
            <input type="checkbox" id="diffToggle">
            <span class="slider"></span>
        </label>
        <span id="labelInsanity" class="difficulty-label">INSANITY</span>
    </div>

    <div id="safeList"></div>

    <div class="footer-box">
        <strong id="footerTitle">⚡ QUICK SOLUTIONS:</strong>
        • Office: MOON - SUN - STAR - MOON<br>
        • Research: STAR - SUN - MOON - SUN<br>
        • Anatomy: Insert LUNG -> Activate HEART directly
    </div>
</div>

<script>
    const safes = [
        { name: "Examination Room", normal: "30R-10L-50R", insanity: "50L-30R-90L", reward: "First Aid Spray" },
        { name: "Bar & Lounge", normal: "10L-80R-30L", insanity: "20R-50L-30R", reward: "Weapon Mod" },
        { name: "Basement Passage", normal: "60R-40L-80R", insanity: "70L-50R-20L", reward: "Hip Pouch (+2)" },
        { name: "Sterilization", normal: "10R-90L-20R", insanity: "80L-50R-0L", reward: "Weapon Upgrade" },
        { name: "Control Room", normal: "50L-60R-80L", insanity: "20R-0L-70R", reward: "Heavy Ammo" }
    ];

    const toggle = document.getElementById('diffToggle');
    const safeListDiv = document.getElementById('safeList');
    const container = document.getElementById('mainContainer');
    const logoIcon = document.getElementById('logoIcon');
    const mainTitle = document.getElementById('mainTitle');
    const footerTitle = document.getElementById('footerTitle');

    function render() {
        const isInsanity = toggle.checked;
        
        // UI Updates
        document.getElementById('labelNormal').className = isInsanity ? 'difficulty-label' : 'difficulty-label active-normal';
        document.getElementById('labelInsanity').className = isInsanity ? 'difficulty-label active-insanity' : 'difficulty-label';
        
        container.className = isInsanity ? 'container insanity-border' : 'container';
        logoIcon.style.color = isInsanity ? 'var(--insanity-red)' : 'var(--neon-green)';
        logoIcon.style.borderColor = isInsanity ? 'var(--insanity-red)' : 'var(--neon-green)';
        mainTitle.style.color = isInsanity ? 'var(--insanity-red)' : 'var(--neon-green)';
        footerTitle.style.color = isInsanity ? 'var(--insanity-red)' : 'var(--neon-green)';

        safeListDiv.innerHTML = '';
        safes.forEach(safe => {
            const code = isInsanity ? safe.insanity : safe.normal;
            const item = document.createElement('div');
            item.className = 'safe-item';
            item.style.borderLeftColor = isInsanity ? 'var(--insanity-red)' : 'var(--neon-green)';
            
            item.innerHTML = `
                <div class="safe-info">
                    <h3>${safe.name}</h3>
                    <p>${safe.reward}</p>
                </div>
                <div class="code-display ${isInsanity ? 'insanity-text' : ''}">${code}</div>
            `;
            safeListDiv.appendChild(item);
        });
    }

    toggle.addEventListener('change', render);
    render();
</script>

</body>
</html>
