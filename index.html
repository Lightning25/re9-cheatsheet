<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RE Requiem CheatSheet</title>
    <style>
        :root {
            /* Das neue, dunklere und matte Emerald-Grün */
            --normal-green: #2ecc71;    
            --insanity-blue: #3498db;
            --dark-bg: #050505;
        }

        body {
            background-color: var(--dark-bg);
            color: #eee;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 95%;
            max-width: 440px;
            background: #111;
            border: 1px solid #1a1a1a;
            border-top: 4px solid var(--normal-green); /* Dezenter Balken oben */
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            transition: border-color 0.4s;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #1a1a1a;
        }

        .header h1 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
            color: #444; /* Dunkler Header-Text */
        }

        .switch { position: relative; display: inline-block; width: 38px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #222; border-radius: 20px; transition: .3s; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background: #666; border-radius: 50%; transition: .3s; }
        
        input:checked + .slider { background: #1a2a3a; }
        input:checked + .slider:before { transform: translateX(18px); background: var(--insanity-blue); }
        input:not(:checked) + .slider:before { background: var(--normal-green); }

        .safe-item {
            background: #0a0a0a;
            margin-bottom: 10px;
            padding: 12px 18px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 3px solid #1a1a1a; /* Standardmäßig dunkler Rand */
        }

        .safe-info h3 { margin: 0; font-size: 14px; color: #fff; font-weight: 500; }
        
        .safe-info p { 
            margin: 3px 0 0; 
            font-size: 10px; 
            color: #bdc3c7; /* Hellgrau für Belohnungen */
            font-weight: bold; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .code-display { 
            font-family: 'Consolas', monospace; 
            font-size: 16px; 
            font-weight: bold; 
            color: var(--normal-green); 
            /* Kein Glow-Effekt mehr */
        }

        .footer-box { 
            margin-top: 20px; 
            padding: 12px; 
            background: #080808; 
            font-size: 11px; 
            color: #444; 
            line-height: 1.6;
            border-radius: 6px;
        }

        .insanity-border { border-top-color: var(--insanity-blue) !important; }
        .insanity-text { color: var(--insanity-blue) !important; }
        .insanity-item { border-left-color: var(--insanity-blue) !important; }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <div class="header">
        <h1 id="titleText">RE REQUIEM</h1>
        <div style="display: flex; align-items: center; gap: 10px;">
            <span id="label" style="font-size: 10px; font-weight: bold; color: var(--normal-green);">NORMAL</span>
            <label class="switch">
                <input type="checkbox" id="diffToggle">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div id="safeList"></div>

    <div class="footer-box">
        <strong>TERMINAL SOLUTIONS:</strong>
        OFFICE: MOON-SUN-STAR-MOON<br>
        RESEARCH: STAR-SUN-MOON-SUN<br>
        SECURITY: STAR-STAR-MOON-SUN
    </div>
</div>

<script>
    const safes = [
        { name: "Untersuchungsraum", normal: "30R-10L-50R", insanity: "50L-30R-90L", reward: "Erste-Hilfe-Spray" },
        { name: "Bar & Lounge", normal: "10L-80R-30L", insanity: "20R-50L-30R", reward: "Waffen-Mod" },
        { name: "Kellergang", normal: "60R-40L-80R", insanity: "70L-50R-20L", reward: "Gürteltasche (+2)" },
        { name: "Sterilisationsraum", normal: "10R-90L-20R", insanity: "80L-50R-0L", reward: "Waffen-Upgrade" },
        { name: "Kontrollraum", normal: "50L-60R-80L", insanity: "20R-0L-70R", reward: "Schwere Munition" }
    ];

    const toggle = document.getElementById('diffToggle');
    const label = document.getElementById('label');
    const safeListDiv = document.getElementById('safeList');
    const container = document.getElementById('mainContainer');

    function render() {
        const isInsanity = toggle.checked;
        label.innerText = isInsanity ? 'INSANITY' : 'NORMAL';
        label.style.color = isInsanity ? 'var(--insanity-blue)' : 'var(--normal-green)';
        container.className = isInsanity ? 'container insanity-border' : 'container';

        safeListDiv.innerHTML = '';
        safes.forEach(safe => {
            const code = isInsanity ? safe.insanity : safe.normal;
            const item = document.createElement('div');
            item.className = 'safe-item' + (isInsanity ? ' insanity-item' : '');
            item.innerHTML = `
                <div class="safe-info">
                    <h3>${safe.name}</h3>
                    <p>${safe.reward}</p>
                </div>
                <div class="code-display ${isInsanity ? 'insanity-text' : ''}">${code}</div>
            `;
            safeListDiv.appendChild(item);
        });
    }

    toggle.addEventListener('change', render);
    render();
</script>

</body>
</html>
