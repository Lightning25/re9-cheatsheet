<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RE Requiem CheatSheet</title>
    <style>
        :root {
            --neon-green: #27ae60;    
            --insanity-purple: #9b59b6; 
            --text-main: #bdc3c7;     /* Haupttext (Namen) */
            --text-reward: #7f8c8d;   /* Belohnungen (jetzt heller!) */
            --dark-bg: #050505;
            --panel-bg: #111111;
        }

        body {
            background: var(--dark-bg);
            color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            width: 95%;
            max-width: 420px;
            background: var(--panel-bg);
            border: 1px solid #222;
            border-top: 3px solid var(--neon-green);
            border-radius: 6px;
            padding: 20px;
            transition: border-color 0.4s;
        }

        .header h1 {
            color: #444; /* Sehr dezent */
            font-size: 14px;
            text-align: center;
            text-transform: uppercase;
            margin: 0 0 15px 0;
            letter-spacing: 2px;
        }

        .toggle-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            background: #0a0a0a;
            padding: 8px;
            border-radius: 4px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #222;
            transition: .3s;
            border-radius: 20px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 14px; width: 14px;
            left: 3px; bottom: 3px;
            background-color: #555;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: #2c1a3c; }
        input:checked + .slider:before { transform: translateX(20px); background-color: var(--insanity-purple); }

        .difficulty-label { font-weight: bold; font-size: 10px; color: #222; }
        .active-normal { color: var(--neon-green); }
        .active-insanity { color: var(--insanity-purple); }

        .safe-item {
            background: #0d0d0d;
            margin-bottom: 5px;
            padding: 10px 15px;
            border-radius: 3px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 2px solid #1a1a1a;
        }

        .safe-info h3 { margin: 0; font-size: 13px; color: #aaa; font-weight: 500; }
        
        /* Die Belohnungen sind jetzt deutlich besser sichtbar */
        .safe-info p { 
            margin: 2px 0 0; 
            font-size: 10px; 
            color: var(--text-reward); 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
        }

        .code-display {
            font-family: 'Consolas', monospace;
            font-size: 14px;
            font-weight: bold;
            color: var(--neon-green);
        }

        .footer-box {
            margin-top: 15px;
            padding: 10px;
            background: #0a0a0a;
            font-size: 11px;
            color: #444;
            border-radius: 3px;
        }

        .footer-box strong { color: #2a2a2a; display: block; margin-bottom: 3px; font-size: 9px; }

        .insanity-border { border-top-color: var(--insanity-purple) !important; }
        .insanity-text { color: #9b59b6 !important; }
        .insanity-item { border-left-color: var(--insanity-purple) !important; }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <div class="header">
        <h1>RE Requiem CheatSheet</h1>
    </div>

    <div class="toggle-container">
        <span id="labelNormal" class="difficulty-label active-normal">NORMAL</span>
        <label class="switch">
            <input type="checkbox" id="diffToggle">
            <span class="slider"></span>
        </label>
        <span id="labelInsanity" class="difficulty-label">INSANITY</span>
    </div>

    <div id="safeList"></div>

    <div class="footer-box">
        <strong>TERMINAL SOLUTIONS:</strong>
        Office: MOON - SUN - STAR - MOON<br>
        Research: STAR - SUN - MOON - SUN<br>
        Security: STAR - STAR - MOON - SUN
    </div>
</div>

<script>
    const safes = [
        { name: "Untersuchungsraum", normal: "30R-10L-50R", insanity: "50L-30R-90L", reward: "Erste-Hilfe-Spray" },
        { name: "Bar & Lounge", normal: "10L-80R-30L", insanity: "20R-50L-30R", reward: "Waffen-Mod" },
        { name: "Kellergang", normal: "60R-40L-80R", insanity: "70L-50R-20L", reward: "Gürteltasche (+2)" },
        { name: "Sterilisationsraum", normal: "10R-90L-20R", insanity: "80L-50R-0L", reward: "Waffen-Upgrade" },
        { name: "Kontrollraum", normal: "50L-60R-80L", insanity: "20R-0L-70R", reward: "Schwere Munition" }
    ];

    const toggle = document.getElementById('diffToggle');
    const safeListDiv = document.getElementById('safeList');
    const container = document.getElementById('mainContainer');

    function render() {
        const isInsanity = toggle.checked;
        
        document.getElementById('labelNormal').className = isInsanity ? 'difficulty-label' : 'difficulty-label active-normal';
        document.getElementById('labelInsanity').className = isInsanity ? 'difficulty-label active-insanity' : 'difficulty-label';
        container.className = isInsanity ? 'container insanity-border' : 'container';

        safeListDiv.innerHTML = '';
        safes.forEach(safe => {
            const code = isInsanity ? safe.insanity : safe.normal;
            const item = document.createElement('div');
            item.className = 'safe-item' + (isInsanity ? ' insanity-item' : '');
            
            item.innerHTML = `
                <div class="safe-info">
                    <h3>${safe.name}</h3>
                    <p>${safe.reward}</p>
                </div>
                <div class="code-display ${isInsanity ? 'insanity-text' : ''}">${code}</div>
            `;
            safeListDiv.appendChild(item);
        });
    }

    toggle.addEventListener('change', render);
    render();
</script>

</body>
</html>
